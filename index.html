<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点亮人生 · 心灵九相原型测评</title>
<style>
  :root {
    --navy: #1A3C6B;
    --purple: #6B3FA0;
    --gold: #B8860B;
    --teal: #0E7490;
    --green: #1A6B3C;
    --red: #C0392B;
    --light-bg: #F8F7FF;
    --text: #222;
    --subtext: #666;
    --border: #E0E0E0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
    background: var(--light-bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Progress Bar ── */
  .progress-bar-container {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #E0E0E0;
    z-index: 100;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--teal));
    transition: width 0.4s ease;
  }

  /* ── Page wrapper ── */
  .page {
    display: none;
    width: 100%;
    max-width: 720px;
    padding: 40px 24px 80px;
    animation: fadeIn 0.35s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Cover ── */
  .cover {
    text-align: center;
    padding-top: 60px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .logo-wrap svg {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }
  .logo-text {
    text-align: left;
    line-height: 1.2;
  }
  .logo-text .org {
    font-size: 20px;
    font-weight: 800;
    color: #D4610A;
    letter-spacing: 1px;
  }
  .logo-text .tagline {
    font-size: 11px;
    color: var(--subtext);
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .cover .brand {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--purple);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .cover h1 {
    font-size: 52px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .cover .sub {
    font-size: 18px;
    color: var(--purple);
    margin-bottom: 40px;
  }
  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--purple), var(--teal));
    margin: 0 auto 40px;
    border-radius: 2px;
  }
  .cover .desc {
    font-size: 15px;
    line-height: 1.9;
    color: var(--subtext);
    max-width: 480px;
    margin: 0 auto 48px;
  }

  .info-boxes {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 48px;
  }
  .info-box {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    min-width: 100px;
  }
  .info-box .num {
    font-size: 28px;
    font-weight: 800;
    color: var(--purple);
    line-height: 1;
  }
  .info-box .label {
    font-size: 12px;
    color: var(--subtext);
    margin-top: 4px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--navy));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(107,63,160,0.3);
    transition: all 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(107,63,160,0.4);
  }
  .btn-primary:active { transform: translateY(0); }

  .note {
    font-size: 12px;
    color: var(--subtext);
    margin-top: 20px;
  }

  /* ── Question ── */
  .q-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .q-num {
    background: linear-gradient(135deg, var(--purple), var(--navy));
    color: white;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .q-meta {
    font-size: 12px;
    color: var(--subtext);
    letter-spacing: 1px;
  }
  .q-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .q-desc {
    font-size: 15px;
    color: var(--subtext);
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 28px;
    padding-left: 12px;
    border-left: 3px solid var(--border);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    background: white;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .option:hover {
    border-color: var(--purple);
    background: #FAF7FF;
    transform: translateX(4px);
  }
  .option.selected {
    border-color: var(--purple);
    background: linear-gradient(135deg, #FAF7FF, #EDE7F6);
    box-shadow: 0 2px 12px rgba(107,63,160,0.15);
  }

  .option-label {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--light-bg);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--subtext);
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .option.selected .option-label {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
  }
  .option-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
    padding-top: 4px;
  }

  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
  }
  .btn-nav {
    background: none;
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 14px;
    color: var(--subtext);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover {
    border-color: var(--purple);
    color: var(--purple);
  }
  .btn-nav.primary {
    background: linear-gradient(135deg, var(--purple), var(--navy));
    border-color: transparent;
    color: white;
    font-weight: 600;
  }
  .btn-nav.primary:hover {
    color: white;
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .btn-nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  /* ── Loading / Calculating ── */
  .calculating {
    text-align: center;
    padding-top: 120px;
  }
  .spinner {
    width: 60px; height: 60px;
    border: 5px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    margin: 0 auto 32px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result ── */
  .result-header {
    text-align: center;
    padding: 40px 0 32px;
  }
  .result-badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 3px;
    color: white;
    background: linear-gradient(135deg, var(--purple), var(--navy));
    padding: 6px 20px;
    border-radius: 50px;
    margin-bottom: 20px;
  }

  .archetype-card {
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 20px;
    border: 2px solid;
    position: relative;
    overflow: hidden;
  }
  .archetype-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    opacity: 0.08;
    background: currentColor;
  }

  .archetype-name {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .archetype-sub {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .archetype-tag {
    display: inline-block;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 50px;
    border: 1px solid currentColor;
    opacity: 0.7;
    margin-bottom: 24px;
  }

  .profile-section {
    margin-bottom: 20px;
  }
  .profile-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .profile-text {
    font-size: 15px;
    line-height: 1.8;
    opacity: 0.9;
  }

  .quote-block {
    border-top: 1px solid currentColor;
    padding-top: 20px;
    margin-top: 24px;
    font-size: 16px;
    font-style: italic;
    line-height: 1.7;
    opacity: 0.85;
    text-align: center;
  }

  /* Secondary archetype */
  .secondary-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .secondary-card .label {
    font-size: 12px;
    color: var(--subtext);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .secondary-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .secondary-desc {
    font-size: 14px;
    color: var(--subtext);
    line-height: 1.6;
    margin-top: 8px;
  }

  /* Scores chart */
  .scores-section {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .scores-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 20px;
  }
  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .score-name {
    font-size: 13px;
    width: 60px;
    flex-shrink: 0;
    color: var(--text);
  }
  .score-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--light-bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }
  .score-count {
    font-size: 13px;
    font-weight: 700;
    width: 20px;
    text-align: right;
    color: var(--subtext);
  }

  /* Combination */
  .combo-card {
    background: linear-gradient(135deg, #FAF7FF, #EDE7F6);
    border: 1px solid #D8C8F0;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .combo-title {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--purple);
    margin-bottom: 8px;
  }
  .combo-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .combo-desc {
    font-size: 14px;
    color: var(--subtext);
    line-height: 1.7;
  }

  /* Restart */
  .result-footer {
    text-align: center;
    padding: 24px 0 48px;
  }
  .btn-restart {
    background: none;
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 12px 32px;
    font-size: 14px;
    color: var(--subtext);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-restart:hover {
    border-color: var(--purple);
    color: var(--purple);
  }

  /* mobile */
  @media (max-width: 480px) {
    .cover h1 { font-size: 38px; }
    .info-boxes { flex-wrap: wrap; }
    .q-title { font-size: 18px; }
    .page { padding: 28px 16px 60px; }
  }
</style>
</head>
<body>

<div class="progress-bar-container">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- ══ COVER ══════════════════════════════════════════════════════════════ -->
<div class="page active" id="page-cover">
  <div class="cover">
    <!-- 点亮人生 logo + 团队名 -->
    <div class="logo-wrap">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="petalG" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF6B00"/>
            <stop offset="100%" stop-color="#FFB300"/>
          </radialGradient>
          <radialGradient id="flameG" cx="50%" cy="70%" r="55%">
            <stop offset="0%" stop-color="#FF2200"/>
            <stop offset="100%" stop-color="#FF6600"/>
          </radialGradient>
        </defs>
        <!-- radiating petals (12 petals) -->
        <g transform="translate(50,50)">
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(0) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(30) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(60) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(90) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(120) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(150) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(180) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(210) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(240) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(270) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(300) translate(0,-28)"/>
          <ellipse rx="6" ry="18" fill="url(#petalG)" transform="rotate(330) translate(0,-28)"/>
        </g>
        <!-- candle body -->
        <rect x="44" y="52" width="12" height="26" rx="3" fill="url(#petalG)"/>
        <!-- wax drips -->
        <ellipse cx="48" cy="78" rx="3" ry="5" fill="#FF4400" opacity="0.85"/>
        <ellipse cx="54" cy="75" rx="2.5" ry="4" fill="#FF4400" opacity="0.75"/>
        <!-- flame -->
        <path d="M50 52 C47 46 44 41 50 35 C56 41 53 46 50 52Z" fill="url(#flameG)"/>
        <path d="M50 50 C48 46 47 43 50 39 C53 43 52 46 50 50Z" fill="#FF2200" opacity="0.6"/>
      </svg>
      <div class="logo-text">
        <div class="org">点亮人生</div>
        <div class="tagline">Soul Nine Archetypes</div>
      </div>
    </div>

    <div class="brand">心灵九相 · 原型测评</div>
    <h1>你是哪种原型？</h1>
    <div class="sub">发现你的心理底色</div>
    <div class="divider"></div>
    <p class="desc">这是一份基于荣格原型理论的自我探索工具。<br>18道日常情境题，帮你发现自己的"自动反应模式"。<br>没有对错之分，跟着第一直觉走。</p>

    <div class="info-boxes">
      <div class="info-box">
        <div class="num">18</div>
        <div class="label">情境问题</div>
      </div>
      <div class="info-box">
        <div class="num">9</div>
        <div class="label">心理原型</div>
      </div>
      <div class="info-box">
        <div class="num">10'</div>
        <div class="label">约需时间</div>
      </div>
    </div>

    <button class="btn-primary" onclick="startQuiz()">开始测评 →</button>
    <p class="note">请用你最真实的第一反应作答</p>
    <div style="margin-top:40px;padding:16px;border-top:1px solid #eee;text-align:center">
      <p style="font-size:11px;color:#999;margin-bottom:4px">© 2026 点亮人生 · 心灵九相系统</p>
      <p style="font-size:10px;color:#bbb">本测评内容及系统设计版权归「点亮人生」所有</p>
      <p style="font-size:10px;color:#bbb">未经授权，禁止复制、转载、修改或用于商业用途，违者必究</p>
    </div>
  </div>
</div>

<!-- ══ QUESTION ════════════════════════════════════════════════════════════ -->
<div class="page" id="page-question">
  <div class="q-header">
    <div class="q-num" id="qNum">1</div>
    <div class="q-meta" id="qMeta">第 1 题，共 18 题</div>
  </div>

  <div class="q-title" id="qTitle"></div>
  <div class="q-desc" id="qDesc"></div>

  <div class="options" id="optionsContainer"></div>

  <div class="q-nav">
    <button class="btn-nav" id="btnPrev" onclick="prevQ()">← 上一题</button>
    <button class="btn-nav primary" id="btnNext" onclick="nextQ()" disabled>下一题 →</button>
  </div>
</div>

<!-- ══ CALCULATING ═════════════════════════════════════════════════════════ -->
<div class="page" id="page-calculating">
  <div class="calculating">
    <div class="spinner"></div>
    <div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:12px">正在解析你的心理底色…</div>
    <div style="font-size:14px;color:var(--subtext)">荣格原型系统计算中</div>
  </div>
</div>

<!-- ══ RESULT ══════════════════════════════════════════════════════════════ -->
<div class="page" id="page-result">
  <!-- filled by JS -->
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════════════════

const ARCHETYPES = {
  wall:     { name: '筑墙人', sub: 'The Wall Builder', tag: '边界守护', color: '#3F51B5', bg: '#E8EAF6' },
  hiker:    { name: '远足者', sub: 'The Hiker',        tag: '自由探索', color: '#388E3C', bg: '#E8F5E9' },
  chall:    { name: '较真者', sub: 'The Challenger',   tag: '直面真相', color: '#E64A19', bg: '#FBE9E7' },
  analyst:  { name: '解析者', sub: 'The Analyst',      tag: '理性洞察', color: '#1976D2', bg: '#E3F2FD' },
  warmer:   { name: '暖场人', sub: 'The Warmer',       tag: '连接温暖', color: '#F57C00', bg: '#FFF3E0' },
  creator:  { name: '造物者', sub: 'The Creator',      tag: '创造转化', color: '#7B1FA2', bg: '#F3E5F5' },
  disrupt:  { name: '搅局者', sub: 'The Disruptor',    tag: '打破常规', color: '#C2185B', bg: '#FCE4EC' },
  helm:     { name: '掌舵人', sub: 'The Helmsman',     tag: '引领方向', color: '#5D4037', bg: '#EFEBE9' },
  observer: { name: '旁观者', sub: 'The Observer',     tag: '深度观察', color: '#455A64', bg: '#ECEFF1' },
};

const PROFILES = {
  wall: {
    pattern: '当外界的刺激接近你的内核时，你的第一反应是建起一道墙。你倾向于通过控制距离来保护自己——不是不在乎，而是太在乎了所以需要一层屏障。你的边界感很强，但有时也会让重要的人被挡在墙外。',
    strength: '你拥有极强的自我保护能力和清晰的边界意识。你知道什么该接受、什么该拒绝，是朋友圈里"最清醒的那个人"。',
    shadow: '你可能会在关系中过早设防。久而久之，你可能感到安全却孤独——被保护了却也被隔离了。',
    relationship: '你是"难追但值得追"的类型。一旦信任建立，你其实是非常忠诚和深情的。你最怕的是被辜负后发现自己的墙白拆了。',
    growth: '试着在安全的关系中练习"不完美的敞开"。允许自己被看见，不代表失去控制。真正的安全感，来自"即使脆弱也不会被伤害"的经验。',
    quote: '"保护自己的最高境界，不是让谁都进不来，而是让对的人不需要翻墙。"',
  },
  hiker: {

// ══════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════
let currentQ = 0;
const answers = new Array(QUESTIONS.length).fill(null);
const responseTimes = new Array(QUESTIONS.length).fill(null); // silent timer (ms)
let questionStartTime = 0; // when current question was shown

// ══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  answers.fill(null);
  responseTimes.fill(null);
  showPage('page-question');
  renderQuestion();
  updateProgress();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qMeta').textContent = `第 ${currentQ + 1} 题，共 ${QUESTIONS.length} 题`;
  document.getElementById('qTitle').textContent = q.title;
  document.getElementById('qDesc').textContent = q.desc;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];

  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ] === i ? ' selected' : '');
    div.innerHTML = `
      <div class="option-label">${labels[i]}</div>
      <div class="option-text">${opt.text}</div>
    `;
    div.onclick = () => selectOption(i);
    container.appendChild(div);
  });

  document.getElementById('btnPrev').disabled = currentQ === 0;
  document.getElementById('btnNext').disabled = answers[currentQ] === null;

  // Last question: change button text
  const btnNext = document.getElementById('btnNext');
  if (currentQ === QUESTIONS.length - 1) {
    btnNext.textContent = '查看结果 →';
  } else {
    btnNext.textContent = '下一题 →';
  }

  // Start silent timer for this question
  questionStartTime = Date.now();
}

function selectOption(idx) {
  // Record response time silently (only first selection per question)
  if (answers[currentQ] === null && questionStartTime > 0) {
    responseTimes[currentQ] = Date.now() - questionStartTime;
  }
  answers[currentQ] = idx;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('btnNext').disabled = false;

  // Auto-advance after short delay
  setTimeout(() => {
    if (answers[currentQ] !== null) nextQ();
  }, 320);
}

function nextQ() {
  if (answers[currentQ] === null) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQuestion();
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // All done
    showCalculating();
  }
}

function prevQ() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function updateProgress() {
  const pct = ((currentQ) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ══════════════════════════════════════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════════════════════════════════════
function showCalculating() {
  showPage('page-calculating');
  document.getElementById('progressFill').style.width = '100%';
  setTimeout(() => {
    const scores = calcScores();
    renderResult(scores);
    showPage('page-result');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 1600);
}

function calcScores() {
  const scores = {};
  Object.keys(ARCHETYPES).forEach(k => scores[k] = 0);

  // Time-based weight: fast answers (<5s) get 1.2x, slow answers (>20s) get 0.8x
  QUESTIONS.forEach((q, qi) => {
    const ans = answers[qi];
    if (ans !== null) {
      const ms = responseTimes[qi] || 10000;
      let weight = 1.0;
      if (ms < 5000) weight = 1.2;       // instinctive
      else if (ms < 10000) weight = 1.0;  // normal
      else if (ms < 20000) weight = 0.9;  // considered
      else weight = 0.8;                   // deliberate
      scores[q.opts[ans].arc] += weight;
    }
  });
  return scores;
}

// Utility: get instinct ratio for result page insight
function getInstinctRatio() {
  const fast = responseTimes.filter(t => t !== null && t < 5000).length;
  return Math.round((fast / QUESTIONS.length) * 100);
}

        return `

          </div>

        </div>`;
      }).join('')}
    </div>

    <!-- Instinct ratio insight -->
    <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:24px;text-align:center">
      <div style="font-size:12px;color:var(--subtext);margin-bottom:4px">直觉指数</div>
      <div style="font-size:28px;font-weight:800;color:var(--purple)">${getInstinctRatio()}%</div>
      <div style="font-size:12px;color:var(--subtext);margin-top:4px">${getInstinctRatio() >= 60 ? '你的大部分选择来自直觉反应，结果可信度较高' : getInstinctRatio() >= 35 ? '你在部分题目上有所思考，结果反映了直觉与理性的混合' : '你在很多题上深思熟虑，结果可能更多反映"期待中的自己"'}</div>

    <!-- Footer -->

        <div style="font-size:14px;color:var(--subtext);line-height:1.7">在安全的团体空间中，通过角色扮演和情境模拟，亲身体验你的原型模式如何运作——你将在"保护性虚构"中安全地看见自己。</div>
      </div>

        <p style="font-size:10px;color:#bbb">© 2026 点亮人生 · 心灵九相系统 · 版权所有，未经授权禁止复制转载，违者必究</p>
      </div>

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.transition = 'width 0.8s ease';
          bar.style.width = w;
        });
      });

}

// DATA SUBMISSION (via FormSubmit → email)
// ══════════════════════════════════════════════════════════════════════════
function submitResult() {
  const contact = document.getElementById('userContact').value.trim();
  const msgEl = document.getElementById('submitMsg');

  if (!contact) {
    msgEl.style.display = 'block';
    msgEl.style.color = '#C0392B';
    msgEl.textContent = '请填写你的微信号';
    return;
  }

  // Gather result data
  const scores = calcScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const primaryKey = sorted[0][0];
  const secondaryKey = sorted[1][0];
  const primary = ARCHETYPES[primaryKey];
  const secondary = ARCHETYPES[secondaryKey];
  const instinct = getInstinctRatio();

  // All scores as text
  const allScores = sorted.map(([k, s]) => `${ARCHETYPES[k].name}:${s.toFixed(1)}`).join(' / ');

  // Response time details
  const avgTime = responseTimes.filter(t => t !== null).reduce((a, b) => a + b, 0) / QUESTIONS.length;

  const payload = {
    _subject: `心灵九相测评结果 | ${primary.name} + ${secondary.name}`,
    _template: 'table',
    _captcha: 'false',
    '微信号': contact,
    '主原型': `${primary.name} (${primary.sub})`,
    '次原型': `${secondary.name} (${secondary.sub})`,
    '直觉指数': `${instinct}%`,
    '平均答题时间': `${(avgTime / 1000).toFixed(1)}秒`,
    '全部得分': allScores,
    '测试时间': new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
  };

  // Show loading
  msgEl.style.display = 'block';
  msgEl.style.color = 'var(--subtext)';
  msgEl.textContent = '提交中...';

  fetch('https://formsubmit.co/ajax/yixiafeng1314@gmail.com', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload),
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById('submitSection').innerHTML = `
        <div style="padding:12px 0">
          <div style="font-size:24px;margin-bottom:8px">&#10003;</div>
          <div style="font-size:15px;font-weight:700;color:var(--green)">提交成功！</div>
          <div style="font-size:13px;color:var(--subtext);margin-top:6px">我们会通过微信联系你，发送专属原型解读</div>
        </div>`;
    } else {
      msgEl.style.color = '#C0392B';
      msgEl.textContent = '提交失败，请稍后重试';
    }
  })
  .catch(() => {
    msgEl.style.color = '#C0392B';
    msgEl.textContent = '网络错误，请稍后重试';
  });
}
